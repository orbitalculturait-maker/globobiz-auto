<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <title>Gloobobiz Automation</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand"><div class="brand-text"><span class="brand-name">Gloobobiz</span></div></div>
    <nav class="sidebar-nav">
      <button class="nav-item active" data-tab="dashboard">Dashboard Mensile</button>
      <button class="nav-item" data-tab="schedule">Piano Excel</button>
      <button class="nav-item" data-tab="settings">Impostazioni</button>
      <button class="nav-item" data-tab="history">Storico</button>
    </nav>
    <div class="sidebar-footer">
      <div class="cron-badge" style="color:var(--text-muted)">
        <span>Modalità Manuale</span>
      </div>
    </div>
  </aside>

  <main class="main-content">
    <!-- DASHBOARD -->
    <section class="tab-panel active" id="tab-dashboard">
      <div class="page-header">
        <h1>Invia Pianificazione Mensile</h1>
      </div>
      <div class="alert alert-error hidden" id="alertError"><div class="alert-body"><p id="alertErrorMsg"></p></div></div>
      <div class="alert alert-success hidden" id="alertSuccess"><div class="alert-body"><p id="alertSuccessMsg"></p></div></div>

      <div class="card">
        <p>Seleziona il mese da inviare a Gloobobiz. Questo script configurerà i 31 giorni del mese selezionato sostituendo la programmazione corrente.</p>
        <br/>
        <select id="meseSelector" style="padding:10px; background:var(--bg); color:white; border:1px solid var(--border); border-radius:4px;">
          <option value="">Caricamento mesi...</option>
        </select>
        <button class="btn btn-primary" id="btnRunMonth" onclick="runMonth()" style="margin-left: 16px;">
          Invia a Gloobobiz
        </button>
      </div>
    </section>

    <!-- PIANO TURNI -->
    <section class="tab-panel" id="tab-schedule">
      <div class="page-header"><h1>Visualizza Excel</h1></div>
      <div class="table-wrap"><table class="turni-table"><tbody id="tbodyCompleta"></tbody></table></div>
    </section>

    <!-- IMPOSTAZIONI -->
    <section class="tab-panel" id="tab-settings">
      <div class="page-header"><h1>Impostazioni</h1></div>
      <div class="card settings-card">
        <div class="settings-card-title">📄 File Excel</div>
        <div class="upload-zone" id="uploadZone" onclick="document.getElementById('fileInput').click()">
          <div class="upload-text">Clicca qui per caricare l'Excel</div>
        </div>
        <input type="file" id="fileInput" accept=".xlsx,.xls" style="display:none" onchange="uploadFile(this)" />
        <div class="upload-result hidden" id="uploadResult"></div>
      </div>
    </section>

    <!-- STORICO -->
    <section class="tab-panel" id="tab-history">
      <div class="page-header"><h1>Storico</h1><button class="btn" onclick="loadHistory()">🔄</button></div>
      <div class="table-wrap"><table class="turni-table"><tbody id="tbodyStorico"></tbody></table></div>
    </section>
  </main>
  <script src="app.js"></script>
</body>
</html>
